# ============================================
# Auto-VAPT: Docker Compose
# ============================================
version: "3.9"

services:
  # Main scanner service
  auto-vapt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-vapt-scanner
    volumes:
      - ./reports:/app/reports
      - ./configs:/app/configs:ro
    environment:
      - LOG_FORMAT=json
    networks:
      - vapt-network
    depends_on:
      zap:
        condition: service_healthy

  # OWASP ZAP daemon for deep scanning
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: auto-vapt-zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true
    ports:
      - "8080:8080"
    networks:
      - vapt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/JSON/core/view/version/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Dashboard (Phase 5)
